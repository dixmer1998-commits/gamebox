# GameBox — Configuración Sunshine
# Optimizada para GPU AMD + PipeWire + Gamescope

# ── General ──
port = 47989
file_state = /home/steam/.config/sunshine/state.json
credentials_file = /home/steam/.config/sunshine/credentials.json
log_level = info
origin_web_ui_allowed = true

# ── Encoding ──
# VAAPI para AMD GPU
encoder = vaapi
adapter_name = /dev/dri/renderD128
output_name = 0
video_bitrate = 50000
fps = 60
qp = 28
min_threads = 1
max_threads = 4

# ── Audio ──
# PipeWire para captura y salida de audio
audio_sink = pipewire
audio_device = auto

# ── Input ──
# inputtino para dispositivos virtuales (teclado, ratón, gamepad)
gamepad = inputtino
keyboard = inputtino
mouse = inputtino

# ── Display ──
# Captura desde PipeWire (la salida de Gamescope)
capture = pipewire
display_name = auto

# ── Network ──
pmp = disabled
upnp = disabled
