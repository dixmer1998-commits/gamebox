# GameBox — Configuración Sunshine (Optimizada para Docker Autónomo)
# Forzado para GPU AMD + PipeWire + Gamescope (Ideal para RX 580 / Polaris)

# ── General ──
port = 47989
file_state = /home/steam/.config/sunshine/state.json
credentials_file = /home/steam/.config/sunshine/credentials.json
log_level = info
origin_web_ui_allowed = true

# ── Encoding ──
# Forzar estrictamente VA-API para GPUs AMD (Polaris/GCN 4.0 no tiene Vulkan Video)
encoder = vaapi
adapter_name = /dev/dri/renderD128
output_name = 0
video_bitrate = 50000
fps = 60
qp = 28
min_threads = 1
max_threads = 4

# ── Audio ──
# PipeWire para captura de audio de baja latencia
audio_sink = pipewire
audio_device = auto

# ── Input ──
# Usar el driver nativo uinput de Linux para evitar dependencias extras de inputtino
gamepad = uinput
keyboard = uinput
mouse = uinput

# ── Display ──
# Usar auto-detección para Wayland / X11
capture = auto
display_name = auto

# ── Network ──
pmp = disabled
upnp = disabled
