# GameBox — Configuración Sunshine
# Forzado para GPU AMD + Wayland (labwc + Gamescope)

# ── General ──
port = 47989
file_state = /home/steam/.config/sunshine/state.json
credentials_file = /home/steam/.config/sunshine/credentials.json
log_level = info
origin_web_ui_allowed = true

# ── Encoding ──
encoder = vaapi
adapter_name = /dev/dri/renderD128
output_name = 0
video_bitrate = 50000
fps = 60
qp = 28
min_threads = 1
max_threads = 4

# ── Audio ──
audio_sink = pipewire
audio_device = auto

# ── Input ──
gamepad = uinput
keyboard = uinput
mouse = uinput

# ── Display ──
# Captura Wayland via wlroots (screencopy protocol)
capture = wlr
display_name = wayland-0

# ── Network ──
pmp = disabled
upnp = disabled
