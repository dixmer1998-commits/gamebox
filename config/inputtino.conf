# GameBox — Configuración inputtino
# inputtino gestiona los dispositivos de entrada virtuales
# que Sunshine crea para que Moonlight pueda enviar
# teclado, ratón y gamepad al contenedor.

# Dispositivos virtuales habilitados
mouse = true
keyboard = true
gamepad = true
touchscreen = false

# Rutas de dispositivos
uinput_path = /dev/uinput

# Gamepad emulado (Xbox 360 es el más compatible)
gamepad_type = xbox360
