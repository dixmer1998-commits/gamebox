# GameBox — Reglas udev para dispositivos virtuales
# Se aplican dentro del contenedor para que inputtino/sunshine
# puedan crear y acceder a dispositivos de entrada virtuales.

# ── uinput — dispositivos de entrada virtuales ──
KERNEL=="uinput", GROUP="input", MODE="0660", OPTIONS+="static_node=uinput"

# ── Dispositivos de entrada del sistema ──
KERNEL=="mouse*", GROUP="input", MODE="0660"
KERNEL=="event*", GROUP="input", MODE="0660"
KERNEL=="js*", GROUP="input", MODE="0660"
KERNEL=="input*", GROUP="input", MODE="0660"

# ── Dispositivos de renderizado AMD ──
KERNEL=="render*", GROUP="render", MODE="0660"
KERNEL=="card*", GROUP="video", MODE="0660"
