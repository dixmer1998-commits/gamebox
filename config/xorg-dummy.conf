# GameBox — Configuración Xorg para display virtual (Modo Escritorio)
# Crea un monitor virtual para KDE Plasma sin necesidad de monitor físico.
# Se usa solo cuando se activa el Modo Escritorio en Sunshine.

Section "Device"
    Identifier  "DummyDevice"
    Driver      "dummy"
    VideoRam    256000
EndSection

Section "Monitor"
    Identifier  "DummyMonitor"
    VendorName  "GameBox"
    ModelName   "Virtual Display"
    Option      "DPMS" "false"
EndSection

Section "Screen"
    Identifier  "DefaultScreen"
    Monitor     "DummyMonitor"
    Device      "DummyDevice"
    SubSection  "Display"
        Depth       24
        Modes       "1920x1080" "2560x1440" "3840x2160"
        Virtual     3840 2160
    EndSubSection
EndSection
