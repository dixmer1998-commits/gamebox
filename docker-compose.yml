# GameBox — Docker Compose
# Variables de entorno opcionales:
#   GAMEBOX_INSTANCE  — nombre de instancia (default: gamebox)
#   TZ               — zona horaria (default: America/Bogota)
#   WAYLAND_DISPLAY  — socket Wayland (default: wayland-0)

services:
  gamebox:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: gamebox:${GAMEBOX_INSTANCE:-latest}
    container_name: gamebox${GAMEBOX_INSTANCE:+-${GAMEBOX_INSTANCE}}
    hostname: gamebox${GAMEBOX_INSTANCE:+-${GAMEBOX_INSTANCE}}
    privileged: true
    restart: unless-stopped
    network_mode: host
    environment:
      - INSTANCE_NAME=${GAMEBOX_INSTANCE:-gamebox}
      - TZ=${TZ:-America/Bogota}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=/run/user/1000
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    volumes:
      - gamebox-data:/home/steam
      - /dev/dri:/dev/dri:rw
      - /dev/uinput:/dev/uinput:rw
      - /dev/input:/dev/input:ro
    devices:
      - /dev/dri
      - /dev/uinput
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
      - SYS_NICE

volumes:
  gamebox-data:
