# GameBox — Docker Compose (Despliegue local autónomo)
# Permite levantar el stack en cualquier distribución Linux con GPU AMD.

services:
  gamebox:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: gamebox:latest
    container_name: gamebox
    hostname: gamebox
    privileged: true
    restart: unless-stopped
    network_mode: host
    environment:
      - INSTANCE_NAME=gamebox
      - TZ=America/Bogota          # Cambia a tu zona horaria local
      - DISPLAY=:10
      - XDG_RUNTIME_DIR=/run/user/1000
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - AUTO_STEAM=false           # Cambia a 'true' para iniciar Steam nativo al arrancar el contenedor
    volumes:
      # Persistencia de juegos de Steam, configuraciones y partidas
      - gamebox-data:/home/steam
      # Acceso a GPU y periféricos
      - /dev/dri:/dev/dri:rw
      - /dev/uinput:/dev/uinput:rw
      - /dev/input:/dev/input:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/uinput:/dev/uinput
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
      - SYS_NICE

volumes:
  gamebox-data:
    name: gamebox-data
